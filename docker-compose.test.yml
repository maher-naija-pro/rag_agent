services:
  test-runner:
    build:
      context: ./rag_agent_pipeline
      args:
        REQUIREMENTS: requirements-test.txt
    container_name: rag-test-runner
    depends_on:
      qdrant-test:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant-test:6333
      - LLM_API_KEY=${LLM_API_KEY:-test-key}
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]

  qdrant-test:
    image: qdrant/qdrant:v1.17.0
    container_name: qdrant-test
    tmpfs:
      - /qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
